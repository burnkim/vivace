<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vivace — A4.All</title>

  <!-- Matched fonts: Playfair Display (EN display serif) + Pretendard (KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/menu.css">

  <style>
    /* Screen preview chrome (not part of the print output) */
    body { background: #e9e9ec; margin: 0; padding: 40px 0; font-family: var(--font-sans); }
    .toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 0;
      display: flex; gap: 8px; justify-content: center; z-index: 10;
    }
    #viewport { display: flex; justify-content: center; }
    .page { box-shadow: 0 8px 40px rgba(0,0,0,.18); }
    @media print {
      body { background: #fff; padding: 0; }
      .page { box-shadow: none; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body data-layout="A4.All">
  <div id="viewport"><div id="stage"></div></div>
  <script src="scripts/render.js"></script>
</body>
</html>
